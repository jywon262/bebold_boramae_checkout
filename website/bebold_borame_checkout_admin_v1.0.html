<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebold Boramae 예약 이력 관리자</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding: 40px 20px; }
        
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        h1 { font-size: 22px; color: #0f172a; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background-color: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-btn:hover { background-color: #e2e8f0; }

        /* 계층 구조 아코디언 스타일 */
        .accordion-item { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
        
        .year-header { background-color: #0f172a; color: white; padding: 15px 20px; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; font-size: 16px; }
        
        .month-container { padding: 10px 15px; background-color: #f8fafc; display: none; }
        .month-header { background-color: #0284c7; color: white; padding: 12px 18px; font-weight: 600; cursor: pointer; border-radius: 6px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 14px; }
        
        .day-container { padding: 10px 15px; background: white; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 10px; display: none; }
        
        /* 일자별 데이터 카드 테이블 */
        .stats-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        .stats-table th { background-color: #f1f5f9; color: #475569; padding: 10px; font-weight: 700; }
        .stats-table td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
        .stats-table tr:last-child td { border-bottom: none; }

        .badge-total { background-color: #e0f2fe; color: #0369a1; padding: 3px 8px; border-radius: 6px; font-weight: 700; }
        .badge-m { background-color: #fff7ed; color: #c2410c; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
        .badge-a { background-color: #f0f9ff; color: #1d4ed8; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
        
        .no-data { text-align: center; color: #94a3b8; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <span>📊 년도별/월별/일별 예약 이력 조회 (유효 예약자 기준)</span>
        <a href="#" id="btn-go-dashboard" class="back-btn">⬅️ 실시간 현황판 보기</a>
    </h1>

    <div id="accordion-root">
        <div class="no-data">이력을 실시간 동기화하여 불러오는 중입니다...</div>
    </div>
</div>

<script>
    // =========================================================================
    // [설정 정보 입력]
    // =========================================================================
    // 💡 메인 현황판 파일명을 바꿀 때는 아래 변수 명만 원하시는 대로 바꿔주시면 됩니다!
    const MAIN_DASHBOARD_PAGE = "bebold_borame_checkout_main_v1.0.html"; 

    const SUPABASE_URL = "https://gqrcvmlkldvdejplbsdh.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcmN2bWxrbGR2ZGVqcGxic2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTkzNTMsImV4cCI6MjA5OTE5NTM1M30.R2ww-seXYkJV7nVGBU_JJqFD9QY8gT2OtURqdXvRnGE";         
    // =========================================================================

    // 1번 수정 반영: 상단 이동 링크 주소 매핑
    document.getElementById('btn-go-dashboard').href = MAIN_DASHBOARD_PAGE;

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 시스템의 오늘 날짜 구하기 (타임존 오차 방지를 위해 한국 표준시 기준으로 YYYY-MM-DD 포맷팅)
    const krToday = new Date().toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    }).replace(/\.\s/g, '-').replace(/\./g, ''); // 결과 예시: "2026-07-15"

    async function loadHistoryStats() {
        const root = document.getElementById('accordion-root');
        
        try {
            const { data, error } = await supabaseClient
                .from('daily_stats')
                .select('*')
                .order('stat_date', { ascending: false });

            if (error || !data || data.length === 0) {
                root.innerHTML = `<div class="no-data">조회된 누적 통계 이력이 존재하지 않습니다.</div>`;
                return;
            }

            const hierarchy = {};
            data.forEach(row => {
                const dateObj = new Date(row.stat_date);
                if(isNaN(dateObj)) return;
                
                const y = dateObj.getFullYear() + "년";
                const m = (dateObj.getMonth() + 1) + "월";
                
                if (!hierarchy[y]) hierarchy[y] = {};
                if (!hierarchy[y][m]) hierarchy[y][m] = [];
                
                hierarchy[y][m].push(row);
            });

            root.innerHTML = '';

            Object.keys(hierarchy).forEach(year => {
                const yearItem = document.createElement('div');
                yearItem.className = 'accordion-item';
                
                const yearHeader = document.createElement('div');
                yearHeader.className = 'year-header';
                yearHeader.innerHTML = `<span>📅 ${year}</span><span>▼</span>`;
                
                const monthContainer = document.createElement('div');
                monthContainer.className = 'month-container';

                yearHeader.onclick = () => {
                    const isVisible = monthContainer.style.display === 'block';
                    monthContainer.style.display = isVisible ? 'none' : 'block';
                    yearHeader.querySelector('span:last-child').innerText = isVisible ? '▼' : '▲';
                };

                // 해당 연도 내부에 오늘 날짜가 포함되어 있는지 추적하기 위한 플래그
                let yearHasToday = false;

                Object.keys(hierarchy[year]).forEach(month => {
                    const monthHeader = document.createElement('div');
                    monthHeader.className = 'month-header';
                    monthHeader.innerHTML = `<span>🗓️ ${month} 이력</span><span>▼</span>`;
                    
                    const dayContainer = document.createElement('div');
                    dayContainer.className = 'day-container';

                    monthHeader.onclick = (e) => {
                        e.stopPropagation(); 
                        const isVisible = dayContainer.style.display === 'block';
                        dayContainer.style.display = isVisible ? 'none' : 'block';
                        monthHeader.querySelector('span:last-child').innerText = isVisible ? '▼' : '▲';
                    };

                    let monthHasToday = false;

                    let tableHtml = `
                        <table class="stats-table">
                            <thead>
                                <tr>
                                    <th>일자</th>
                                    <th>총 예약 인원 (취소 제외)</th>
                                    <th>오전 타임</th>
                                    <th>오후 타임</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    hierarchy[year][month].forEach(dayRow => {
                        // 💡 2번 요구사항: 데이터 리스트 중 오늘 날짜가 있는지 검사합니다.
                        if (dayRow.stat_date === krToday) {
                            yearHasToday = true;
                            monthHasToday = true;
                        }

                        tableHtml += `
                            <tr ${dayRow.stat_date === krToday ? 'style="background-color: #f0fdf4;"' : ''}>
                                <td><b>${dayRow.stat_date}</b> ${dayRow.stat_date === krToday ? '<span style="color:#16a34a; font-size:11px; margin-left:4px;">(오늘)</span>' : ''}</td>
                                <td><span class="badge-total">${dayRow.total_count}명</span></td>
                                <td><span class="badge-m">${dayRow.morning_count}명</span></td>
                                <td><span class="badge-a">${dayRow.afternoon_count}명</span></td>
                            </tr>
                        `;
                    });

                    tableHtml += `</tbody></table>`;
                    dayContainer.innerHTML = tableHtml;

                    monthContainer.appendChild(monthHeader);
                    monthContainer.appendChild(dayContainer);

                    // 💡 오늘 날짜가 속한 월 아코디언 자동 열기 처리
                    if (monthHasToday) {
                        dayContainer.style.display = 'block';
                        monthHeader.querySelector('span:last-child').innerText = '▲';
                    }
                });

                yearItem.appendChild(yearHeader);
                yearItem.appendChild(monthContainer);
                root.appendChild(yearItem);

                // 💡 오늘 날짜가 속한 연도 아코디언 자동 열기 처리
                if (yearHasToday) {
                    monthContainer.style.display = 'block';
                    yearHeader.querySelector('span:last-child').innerText = '▲';
                }
            });

        } catch (err) {
            root.innerHTML = `<div class="no-data" style="color:red;">오류 발생: ${err.message}</div>`;
        }
    }

    loadHistoryStats();
</script>
</body>
</html>
